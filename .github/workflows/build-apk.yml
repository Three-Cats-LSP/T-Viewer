name: Build T-Viewer APK

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'Android Apk/**'
      - 'README.md'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm ci

      - name: Prepare www folder
        run: |
          mkdir -p www
          cp index.html www/
          cp manifest.json www/
          cp icon-192.png www/
          cp icon-512.png www/

      - name: Capacitor sync
        run: npx cap sync android

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Locate APK
        id: find_apk
        run: |
          APK=$(find android/app/build/outputs/apk/debug -name "*.apk" | head -1)
          echo "apk_path=$APK" >> $GITHUB_OUTPUT

      - name: Commit APK to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p "Android Apk"
          cp "${{ steps.find_apk.outputs.apk_path }}" "Android Apk/T-Viewer.apk"
          git add "Android Apk/T-Viewer.apk"
          git diff --cached --quiet && echo "No APK changes" && exit 0
          git commit -m "build: update T-Viewer.apk [skip ci]"
          git push

      - name: Notify homepage to sync APK
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.SYNC_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/Three-Cats-LSP/threecats-lsp.com/dispatches \
            -d '{"event_type":"sync-apk-t-viewer"}'
