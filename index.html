<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="T-Viewer">
<meta name="theme-color" content="#0a1628" id="theme-meta">
<title>T-Viewer</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">

<!-- Capacitor runtime — loaded by the WebView; no-op stub when running in browser -->
<script>
  if (!window.Capacitor) {
    window.Capacitor = {
      isNativePlatform: () => false,
      Plugins: {}
    };
  }
</script>
<style>
  /* ── DARK THEME (default) — matches LSP D-Planner exactly ── */
  :root {
    --bg:        #030c18;
    --surface:   #07121f;
    --card:      #0a1a2e;
    --card2:     #0d2038;
    --rim:       rgba(0,200,255,0.18);
    --border:    rgba(0,200,255,0.09);
    --border-hi: rgba(0,200,255,0.28);
    --accent:    #00d9ff;
    --accent2:   #00b8a0;
    --text:      #d8eef8;
    --muted:     #3e6882;
    --tip:       #5ba4c2;
    --dim:       #142535;
    --green:     #26d07c;
    --yellow:    #ffb703;
    --orange:    #ff6d00;
    --red:       #ff4757;
    --gold:      #d4af37;
    --bar:       52px;
    --fs:        15px;
    /* syntax — maps to LSP semantic colours */
    --syn-h:   var(--accent);          /* headers     → cyan accent */
    --syn-s:   var(--border-hi);       /* separators  → dim border */
    --syn-d:   var(--yellow);          /* data/numbers→ amber */
    --syn-w:   var(--orange);          /* warnings    → orange */
    --syn-l:   var(--accent2);         /* labels      → teal */
  }

  /* ── LIGHT THEME — matches LSP D-Planner light mode exactly ── */
  body.light-theme {
    --bg:        #ffffff;
    --surface:   #f8f9fa;
    --card:      #eff3f8;
    --card2:     #e8ecf1;
    --rim:       rgba(0,100,200,0.25);
    --border:    rgba(0,100,200,0.25);
    --border-hi: rgba(0,100,200,0.45);
    --accent:    #0055aa;
    --accent2:   #005544;
    --text:      #1a1a1a;
    --muted:     #555555;
    --tip:       #4a7fa0;
    --dim:       #cccccc;
    --green:     #1a9e55;
    --yellow:    #FFBF00;
    --orange:    #ff5500;
    --red:       #FF3131;
    --gold:      #996600;
    /* syntax — darker for sunlight readability */
    --syn-h:   var(--accent);          /* headers     → blue */
    --syn-s:   var(--dim);             /* separators  → grey */
    --syn-d:   var(--gold);            /* data/numbers→ dark gold */
    --syn-w:   var(--orange);          /* warnings    → orange-red */
    --syn-l:   var(--accent2);         /* labels      → dark teal */
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier New', Courier, monospace;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    transition: background .2s, color .2s;
  }

  /* ── TOP BAR ── */
  #topbar {
    position: fixed;
    top: env(safe-area-inset-top, 0);
    left: 0; right: 0;
    height: var(--bar);
    background: var(--surface);
    border-bottom: 1px solid var(--rim);
    display: flex;
    align-items: center;
    padding: 0 8px;
    gap: 6px;
    z-index: 100;
    transition: background .2s, border-color .2s;
  }

  #logo {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: .1em;
    color: var(--accent);
    white-space: nowrap;
    flex-shrink: 0;
  }

  #filename {
    flex: 1;
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-align: center;
    padding: 0 4px;
  }

  /* ── BUTTONS ── */
  .btn {
    display: flex; align-items: center; justify-content: center;
    width: 40px; height: 40px;
    border-radius: 8px;
    border: 1px solid var(--rim);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    flex-shrink: 0;
    transition: background .12s, border-color .2s, color .2s;
    -webkit-user-select: none; user-select: none;
  }
  .btn:active { background: var(--rim); }
  .btn svg {
    width: 20px; height: 20px;
    fill: none; stroke: currentColor;
    stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
  }
  .btn.hidden { display: none; }

  /* theme toggle — highlight when day mode is active */
  body.light-theme #btn-theme { border-color: var(--accent); color: var(--accent); }

  /* ── SCROLL AREA ── */
  #scroll {
    position: fixed;
    top: calc(env(safe-area-inset-top, 0px) + var(--bar));
    bottom: calc(env(safe-area-inset-bottom, 0px) + var(--bar));
    left: 0; right: 0;
    overflow-y: auto;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior: contain;
  }
  #scroll::-webkit-scrollbar { width: 3px; height: 3px; }
  #scroll::-webkit-scrollbar-thumb { background: var(--rim); border-radius: 2px; }

  /* ── TEXT CONTENT ── */
  #content {
    padding: 14px 16px;
    font-size: var(--fs);
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
    color: var(--text);
    min-height: 100%;
    tab-size: 4;
    transition: color .2s;
  }

  /* syntax colours — use CSS vars so they flip with theme */
  .h { color: var(--syn-h); font-weight: bold; }
  .s { color: var(--syn-s); }
  .d { color: var(--syn-d); }
  .w { color: var(--syn-w); }
  .l { color: var(--syn-l); }

  /* ── LIGHT THEME: force readable dark text on white ── */
  body.light-theme #content { color: #000000; }
  body.light-theme #content .h { color: var(--syn-h); }
  body.light-theme #content .s { color: #888888; }
  body.light-theme #content .d { color: var(--syn-d); }
  body.light-theme #content .w { color: var(--syn-w); }
  body.light-theme #content .l { color: var(--syn-l); }

  /* ── EMPTY STATE ── */
  #empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 18px;
    color: var(--muted);
    text-align: center;
    padding: 32px;
  }
  #empty svg   { width: 60px; height: 60px; stroke: var(--accent2); fill: none; stroke-width: 1.1; stroke-linecap: round; stroke-linejoin: round; }
  #empty h2    { font-size: 16px; color: var(--accent); letter-spacing: .08em; }
  #empty p     { font-size: 13px; line-height: 1.65; max-width: 260px; }
  #empty small { font-size: 11px; color: var(--muted); }

  #open-big {
    background: var(--accent2);
    border: none;
    color: #fff;
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: .06em;
    padding: 13px 32px;
    border-radius: 10px;
    cursor: pointer;
    transition: background .12s;
  }
  #open-big:active { background: var(--accent); }

  /* ── BOTTOM BAR ── */
  #bottombar {
    position: fixed;
    bottom: env(safe-area-inset-bottom, 0);
    left: 0; right: 0;
    height: var(--bar);
    background: var(--surface);
    border-top: 1px solid var(--rim);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    z-index: 100;
    transition: background .2s, border-color .2s;
  }

  #zoom-label {
    font-size: 12px;
    color: var(--muted);
    width: 40px;
    text-align: center;
  }

  input[type=range] {
    -webkit-appearance: none; appearance: none;
    width: 110px; height: 4px;
    border-radius: 2px;
    background: var(--rim);
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }
  input[type=range]::-moz-range-thumb {
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--accent);
    border: none; cursor: pointer;
  }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: calc(env(safe-area-inset-bottom, 0px) + var(--bar) + 12px);
    left: 50%;
    transform: translateX(-50%) translateY(16px);
    background: var(--accent2);
    color: #fff;
    font-size: 13px;
    padding: 8px 20px;
    border-radius: 20px;
    opacity: 0;
    transition: opacity .22s, transform .22s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 300;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  #filein { display: none; }

  /* ── DRAG-OVER OVERLAY ── */
  #dropzone {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 500;
    background: rgba(3, 12, 24, 0.92);
    border: 3px dashed var(--accent);
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    color: var(--accent);
    font-size: 18px;
    font-weight: 700;
    letter-spacing: .1em;
    pointer-events: none;
  }
  #dropzone.active { display: flex; }
  #dropzone svg { width: 56px; height: 56px; stroke: var(--accent); fill: none; stroke-width: 1.4; stroke-linecap: round; stroke-linejoin: round; }
</style>
</head>
<body>

<input type="file" id="filein" accept=".txt,.log,.plan,.div,text/*">

<!-- DRAG-AND-DROP OVERLAY -->
<div id="dropzone">
  <svg viewBox="0 0 64 64"><path d="M12 8h28l12 12v36H12z"/><polyline points="40,8 40,20 52,20"/><line x1="32" y1="22" x2="32" y2="44"/><polyline points="22,34 32,22 42,34"/></svg>
  DROP FILE HERE
</div>

<!-- TOP BAR -->
<div id="topbar">
  <span id="logo">T-VIEWER</span>
  <span id="filename">no file</span>
  <button class="btn" id="btn-open" title="Open file">
    <svg viewBox="0 0 24 24"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/></svg>
  </button>
  <button class="btn hidden" id="btn-share" title="Share">
    <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
  </button>
  <button class="btn hidden" id="btn-copy" title="Copy all">
    <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
  </button>
  <!-- Day/Night toggle -->
  <button class="btn" id="btn-theme" title="Day / Night" style="font-size:16px;">
    <span id="theme-icon">🌙</span>
  </button>
</div>

<!-- CONTENT -->
<div id="scroll">
  <div id="content">
    <div id="empty">
      <svg viewBox="0 0 64 64">
        <path d="M12 8h28l12 12v36H12z"/>
        <polyline points="40,8 40,20 52,20"/>
        <line x1="20" y1="32" x2="44" y2="32"/>
        <line x1="20" y1="40" x2="44" y2="40"/>
        <line x1="20" y1="48" x2="36" y2="48"/>
      </svg>
      <h2>T-VIEWER</h2>
      <p id="empty-hint">Open a text file — or share one from LSP D-Planner directly into this app.</p>
      <button id="open-big">OPEN FILE</button>
      <small id="empty-sub">UTF-8 · Unicode · plain text</small>
    </div>
  </div>
</div>

<!-- BOTTOM BAR -->
<div id="bottombar">
  <button class="btn" id="btn-sm" title="Smaller">
    <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>
  <input type="range" id="zoom" min="10" max="32" value="15" step="1">
  <button class="btn" id="btn-lg" title="Bigger">
    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>
  <span id="zoom-label">15px</span>
</div>

<div id="toast"></div>

<script>
function cap(plugin) {
  return window?.Capacitor?.Plugins?.[plugin] ?? null;
}

// ── DOM refs ──
const content   = document.getElementById('content');
const scroll    = document.getElementById('scroll');
const fname     = document.getElementById('filename');
const btnOpen   = document.getElementById('btn-open');
const btnShare  = document.getElementById('btn-share');
const btnCopy   = document.getElementById('btn-copy');
const btnTheme  = document.getElementById('btn-theme');
const themeIcon = document.getElementById('theme-icon');
const btnLg     = document.getElementById('btn-lg');
const btnSm     = document.getElementById('btn-sm');
const zoomSlide = document.getElementById('zoom');
const zoomLbl   = document.getElementById('zoom-label');
const openBig   = document.getElementById('open-big');
const filein    = document.getElementById('filein');
const toastEl   = document.getElementById('toast');
const empty     = document.getElementById('empty');
const themeMeta = document.getElementById('theme-meta');

let currentText = '';
let toastTimer;

// ── Theme ─────────────────────────────────────────────────
function applyTheme(light) {
  document.body.classList.toggle('light-theme', light);
  themeIcon.textContent = light ? '☀️' : '🌙';
  themeMeta.content = light ? '#f8f9fa' : '#030c18';
  try { localStorage.setItem('tv_theme', light ? 'light' : 'dark'); } catch {}
}

let isLightTheme = false;
try { isLightTheme = localStorage.getItem('tv_theme') === 'light'; } catch {}
applyTheme(isLightTheme);

btnTheme.addEventListener('click', () => {
  isLightTheme = !isLightTheme;
  applyTheme(isLightTheme);
});

// ── Zoom ──────────────────────────────────────────────────
function applyZoom(px) {
  px = Math.min(32, Math.max(10, Math.round(px)));
  content.style.fontSize = px + 'px';
  zoomLbl.textContent    = px + 'px';
  zoomSlide.value        = px;
  try { localStorage.setItem('tv_zoom', px); } catch {}
}
try { applyZoom(+localStorage.getItem('tv_zoom') || 15); } catch { applyZoom(15); }

zoomSlide.addEventListener('input', () => applyZoom(+zoomSlide.value));
btnLg.addEventListener('click', () => applyZoom(+zoomSlide.value + 1));
btnSm.addEventListener('click', () => applyZoom(+zoomSlide.value - 1));

// Pinch-to-zoom
let _pt0 = 0;
scroll.addEventListener('touchstart', e => {
  if (e.touches.length === 2)
    _pt0 = Math.hypot(e.touches[0].clientX - e.touches[1].clientX,
                      e.touches[0].clientY - e.touches[1].clientY);
}, { passive: true });
scroll.addEventListener('touchmove', e => {
  if (e.touches.length !== 2 || !_pt0) return;
  e.preventDefault();
  const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX,
                       e.touches[0].clientY - e.touches[1].clientY);
  applyZoom(+zoomSlide.value * d / _pt0);
  _pt0 = d;
}, { passive: false });
scroll.addEventListener('touchend', () => { _pt0 = 0; });

// ── Toast ─────────────────────────────────────────────────
function toast(msg, ms = 2200) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), ms);
}

// ── Syntax highlight ──────────────────────────────────────
function highlight(text) {
  return text.split('\n').map(line => {
    const e = line.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    if (/^[\s=\-─═*·.]{3,}$/.test(line.trim()))                   return `<span class="s">${e}</span>`;
    if (/^[A-Z0-9 _\-:]{4,}$/.test(line.trim()))                   return `<span class="h">${e}</span>`;
    if (/\b\d+(\.\d+)?\s*(m|ft|bar|ata|psi|min|sec)\b/i.test(line)) return `<span class="d">${e}</span>`;
    if (/\b(warn|caution|alert|danger|deco|mandatory|stop)\b/i.test(line)) return `<span class="w">${e}</span>`;
    if (/^[\w\s\/\(\)]{2,25}:\s+\S/.test(line))                    return `<span class="l">${e}</span>`;
    return e;
  }).join('\n');
}

// ── Load text ─────────────────────────────────────────────
function loadText(text, name) {
  currentText = text;
  empty.style.display = 'none';
  content.innerHTML = highlight(text);
  fname.textContent = name || 'file';
  btnShare.classList.remove('hidden');
  btnCopy.classList.remove('hidden');
  scroll.scrollTop = 0;
}

// ── Open file ─────────────────────────────────────────────
function openFile() { filein.click(); }

filein.addEventListener('change', () => {
  const file = filein.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => loadText(e.target.result, file.name);
  reader.onerror = () => toast('Could not read file ✗');
  reader.readAsText(file, 'UTF-8');
  filein.value = '';
});

btnOpen.addEventListener('click', openFile);
openBig.addEventListener('click', openFile);

// ── Handle file intent from another app ───────────────────
async function handleAppUrl(url) {
  if (!url) return;
  const Filesystem = cap('Filesystem');
  if (!Filesystem) return;
  try {
    const result = await Filesystem.readFile({ path: url, encoding: 'utf8' });
    const name = decodeURIComponent(url.split('/').pop().split('%2F').pop());
    loadText(result.data, name);
  } catch (err) {
    toast('Cannot open: ' + (err.message || err));
  }
}

window.addEventListener('DOMContentLoaded', () => {
  if (window.Capacitor) {
    const App = cap('App');
    if (App) {
      App.addListener('appUrlOpen', data => handleAppUrl(data.url));
      App.getLaunchUrl().then(data => {
        if (data && data.url) handleAppUrl(data.url);
      }).catch(() => {});
    }
  }
});

// ── Share ─────────────────────────────────────────────────
btnShare.addEventListener('click', async () => {
  if (!currentText) return;
  const Share = cap('Share');
  if (Share) {
    try {
      await Share.share({ title: fname.textContent, text: currentText, dialogTitle: 'Share dive plan' });
    } catch (e) {
      if (e.message !== 'Share canceled') toast('Share failed');
    }
  } else {
    if (navigator.share) navigator.share({ title: fname.textContent, text: currentText }).catch(() => {});
    else copyAll();
  }
});

// ── Copy ──────────────────────────────────────────────────
function copyAll() {
  if (!currentText) return;
  navigator.clipboard?.writeText(currentText)
    .then(() => toast('Copied ✓'))
    .catch(() => {
      const ta = Object.assign(document.createElement('textarea'),
        { value: currentText, style: 'position:fixed;opacity:0' });
      document.body.appendChild(ta); ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      toast('Copied ✓');
    });
}
btnCopy.addEventListener('click', copyAll);

// ── Drag and drop (web / desktop) ──────────────────────────
const dropzone = document.getElementById('dropzone');
let dragCounter = 0;

document.addEventListener('dragenter', e => {
  if (!e.dataTransfer.types.includes('Files')) return;
  dragCounter++;
  dropzone.classList.add('active');
});
document.addEventListener('dragleave', () => {
  dragCounter--;
  if (dragCounter <= 0) { dragCounter = 0; dropzone.classList.remove('active'); }
});
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => {
  e.preventDefault();
  dragCounter = 0;
  dropzone.classList.remove('active');
  const file = e.dataTransfer.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => loadText(ev.target.result, file.name);
  reader.onerror = () => toast('Could not read file ✗');
  reader.readAsText(file, 'UTF-8');
});

// ── Adjust empty-state hint for platform ─────────────────────
(function() {
  const isNative = window.Capacitor?.isNativePlatform?.();
  const isMobile = /Mobi|Android/i.test(navigator.userAgent);
  if (!isNative && !isMobile) {
    document.getElementById('empty-hint').textContent =
      'Open a text file or drag and drop it here.';
    document.getElementById('empty-sub').textContent =
      'UTF-8 · Unicode · plain text · Ctrl+O to open';
  }
})();

// ── Keyboard shortcuts ────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === 'o')             { e.preventDefault(); openFile(); }
    if (e.key === '=' || e.key === '+') { e.preventDefault(); applyZoom(+zoomSlide.value + 1); }
    if (e.key === '-')             { e.preventDefault(); applyZoom(+zoomSlide.value - 1); }
    if (e.key === 'd')             { e.preventDefault(); isLightTheme = !isLightTheme; applyTheme(isLightTheme); }
  }
});
</script>
</body>
</html>
